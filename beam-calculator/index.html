<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beam Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="../logo.png" /> 
</head>

<body>
<div class="page">

  <!-- HERO -->
  <header class="hero">
    <p class="eyebrow">STRUCTURAL TOOL</p>
    <h1>Beam Calculator</h1>
    <p class="hero__text">
      Analyze simply supported beams with point loads and distributed loads.
    </p>
  </header>

  <!-- MAIN -->
  <main class="layout">

    <!-- INPUT PANEL -->
    <div class="card">
      <h2>Beam Inputs</h2>

      <div class="form-group">
        <label>Beam Length (m)</label>
        <input type="number" id="length" value="5">
      </div>

      <div class="form-group">
        <label>Load Type</label>
        <select id="loadType">
          <option value="point">Point Load</option>
          <option value="udl">Uniform Load (UDL)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Load Magnitude (kN)</label>
        <input type="number" id="load" value="10">
      </div>

      <div class="form-group" id="positionGroup">
        <label>Load Position (m)</label>
        <input type="number" id="position" value="2">
      </div>

      <button class="btn btn-primary" onclick="calculateBeam()">Calculate</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="card">
      <h2>Results</h2>

      <div class="result">
        <span>Reaction A:</span>
        <strong id="ra">-</strong>
      </div>

      <div class="result">
        <span>Reaction B:</span>
        <strong id="rb">-</strong>
      </div>

      <div class="result">
        <span>Max Shear Force:</span>
        <strong id="shear">-</strong>
      </div>

      <div class="result">
        <span>Max Bending Moment:</span>
        <strong id="moment">-</strong>
      </div>
    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
