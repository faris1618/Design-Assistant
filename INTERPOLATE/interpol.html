<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Interpolation Calculator</title>
  <link rel="stylesheet" href="interpol_style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lora:wght@700&display=swap"
    rel="stylesheet"
  />
  <script src="interpol_script.js" defer></script>
  <link rel="icon" type="image/png" href="../logo.png" /> 
</head>
<body>

  <div class="mainframe">

    <h1 class="heading">ONLINE<br>Interpolation Calculator</h1>

    <div class="input">

      <p class="pair-label">Point 1</p>
      <div class="input-rows">
        <input class="num" id="num_x1" type="number" placeholder="x1" />
        <input class="num" id="num_y1" type="number" placeholder="y1" />
      </div>

      <p class="pair-label">Point 2</p>
      <div class="input-rows">
        <input class="num" id="num_x2" type="number" placeholder="x2" />
        <input class="num" id="num_y2" type="number" placeholder="y2" />
      </div>

      <hr class="divider" />

      <div class="x-inputs-header">
        <p class="pair-label">Interpolate at</p>
        <button type="button" id="add-btn" onclick="addRow()">+ Add x</button>
      </div>

      <div id="x-inputs">
        <div class="x-row">
          <input class="num" type="number" placeholder="x" />
          <span class="arrow">→</span>
          <input class="num result" type="number" placeholder="y" readonly />
        </div>
      </div>

    </div>

    <button id="calculate-button" type="button" onclick="interpolate()">
      Calculate
    </button>

  </div>

</body>
</html>
